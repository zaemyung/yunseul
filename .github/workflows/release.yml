name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            # `contents: write` lets `gh release create` publish the draft.
            # `id-token: write` and `attestations: write` are required by
            # actions/attest-build-provenance so release assets ship with
            # a verifiable provenance attestation
            # (see https://github.com/actions/attest-build-provenance).
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Run tests
              run: npm test

            # Attest provenance for the release assets BEFORE creating the
            # draft release. If attestation fails (e.g. transient GitHub
            # attestations API outage), the workflow fails loud rather than
            # publishing unsigned artifacts. Reviewers can verify with
            #   gh attestation verify main.js --owner zaemyung
            # Pinned to v1 for stability — v2 (2025-09) introduced surface
            # changes that we haven't validated against this workflow.
            - name: Attest release artifacts
              uses: actions/attest-build-provenance@v1
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json styles.css
